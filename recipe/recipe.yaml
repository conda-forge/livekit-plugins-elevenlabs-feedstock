schema_version: 1

context:
  version: 1.5.1

package:
  name: livekit-plugins-elevenlabs
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit-plugins-elevenlabs/livekit_plugins_elevenlabs-${{ version }}.tar.gz
    sha256: d1ec773d4471230268de738de74ac89b9a5a007c29169c6ed59fb5021f0b5ff1
  - url: https://raw.githubusercontent.com/livekit/agents/refs/tags/livekit-agents%40${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - livekit-agents >=1.5.1
tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - livekit.plugins.elevenlabs
      pip_check: true

about:
  summary: Agent Framework plugin for voice synthesis with ElevenLabs' API.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/livekit-plugins-elevenlabs/
  repository: https://github.com/livekit/agents
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - conda-forge/livekit
